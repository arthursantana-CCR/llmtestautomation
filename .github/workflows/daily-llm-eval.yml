name: Daily LLM Eval (OpenAI + Claude)

on:
  schedule:
    # 10:00 GMT-3 = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || (npm install && npm ci)

      - name: Run promptfoo eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p results/history
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          npx promptfoo eval --no-cache -c ./promptfooconfig.yaml --output "results/history/${TS}.json"
          cp "results/history/${TS}.json" results/latest.json

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/history results/latest.json
          git commit -m "Daily eval: ${TS}" || echo "No changes to commit"
          git push
