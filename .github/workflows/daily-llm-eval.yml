name: Daily LLM Eval (OpenAI + Claude)

on:
  workflow_dispatch:
  schedule:
    # 10:00 GMT-3 = 13:00 UTC
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: daily-llm-eval
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ✅ NEW: install dependencies from package-lock.json (includes js-yaml)
      - name: Install Node dependencies
        run: npm ci

      - name: Clean npx cache
        run: |
          rm -rf ~/.npm/_npx

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Build promptfoo config from eval_config.yaml
        run: |
          node scripts/build_promptfoo_config.mjs

      - name: Run promptfoo (fresh npx)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p results/history
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")

          npx -y promptfoo@latest eval --no-cache \
            -c ./promptfooconfig.yaml \
            --output "results/history/${TS}.json"

          cp "results/history/${TS}.json" results/latest.json
          echo "$TS" > results/latest_timestamp.txt

      - name: Post results to Airtable
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          test -f results/latest.json
          node scripts/post_to_airtable.mjs

      - name: Commit results back to repo
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results/history results/latest.json results/latest_timestamp.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily eval run"

          # Retry loop to handle concurrent pushes to main
          for i in 1 2 3 4 5; do
            echo "Attempt $i: rebasing on latest main and pushing..."
            git fetch origin main
            git rebase origin/main || (git rebase --abort && exit 1)

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (likely non-fast-forward). Waiting a bit and retrying..."
            sleep $((i * 2))
          done

          echo "Push failed after multiple retries."
          exit 1
