name: Daily LLM Eval (OpenAI + Claude)

on:
  workflow_dispatch:
  schedule:
    # 10:00 GMT-3 = 13:00 UTC
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clean local deps + npx cache
        run: |
          rm -rf node_modules
          rm -rf ~/.npm/_npx

        - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Run promptfoo (fresh npx)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p results/history
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")

          npx -y promptfoo@latest eval --no-cache \
            -c ./promptfooconfig.yaml \
            --output "results/history/${TS}.json"

          cp "results/history/${TS}.json" results/latest.json

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/history results/latest.json
          git commit -m "Daily eval run" || echo "No changes to commit"
          git push
