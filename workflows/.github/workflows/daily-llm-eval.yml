name: Daily LLM Eval (OpenAI + Claude)

on:
  workflow_dispatch:
  schedule:
    # 10:00 GMT-3 = 13:00 UTC
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: daily-llm-eval
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clean local deps + npx cache
        run: |
          rm -rf node_modules
          rm -rf ~/.npm/_npx

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Run promptfoo (fresh npx)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p results/history
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")

          npx -y promptfoo@latest eval --no-cache \
            -c ./promptfooconfig.yaml \
            --output "results/history/${TS}.json"

          cp "results/history/${TS}.json" results/latest.json

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results/history results/latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily eval run"

          git pull --rebase origin main
          git push origin HEAD:main

      - name: Post results to Airtable
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          test -f results/latest.json
          node scripts/post_to_airtable.mjs
